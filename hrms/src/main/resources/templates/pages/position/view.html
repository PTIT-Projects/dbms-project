<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Details - HRMS</title>
    <!-- Include the header fragment with CSS links -->
    <div th:replace="~{fragments/header :: header-css}"></div>

    <link rel="stylesheet" href="/hrms/src/main/resources/templates/pages/insurance/congdao.css">
</head>

<body>
    <div class="container-fluid"> 
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div th:replace="~{fragments/header :: header-content}"></div>

                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Position Details</h1>
                    <div>
                        <a th:href="@{/admin/pages/positions}" class="btn btn-outline-secondary">
                            <i style="background-color:whitesmoke; color: black;">Back to List</i> 
                        </a>
                    </div>
                </div>

                <!-- Position information -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Position Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <h6 class="fw-bold">Basic Information</h6>
                                <table class="table table-bordered">
                                    <tr>
                                        <th width="30%">Position ID</th>
                                        <td th:text="${position.id}">1</td>
                                    </tr>
                                    <tr>
                                        <th>Position Name</th>
                                        <td th:text="${position.positionName}">Developer</td>
                                    </tr>
                                </table>
                            </div>
                            <div class="col-md-6">
                                <h6 class="fw-bold">Department Information</h6>
                                <table class="table table-bordered">
                                    <tr>
                                        <th width="30%">Department ID</th>
                                        <td th:text="${position.department.id}">101</td>
                                    </tr>
                                    <tr>
                                        <th>Department Name</th>
                                        <td th:text="${position.department.departmentName}">IT Department</td>
                                    </tr>
                                </table>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-3" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/admin/pages/positions/{id}/edit(id=${position.id})}"
                                class="btn btn-primary me-2">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <a th:href="@{/admin/pages/positions/{id}/delete(id=${position.id})}"
                                class="btn btn-danger"
                                onclick="return confirm('Are you sure you want to delete this position?')">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Scripts fragment -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>

</html>
