<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Notification - HRMS</title>
    <div th:replace="~{fragments/header :: header-css}"></div>

    <link rel="stylesheet" href="/hrms/src/main/resources/templates/pages/insurance/congdao.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
 
        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div th:replace="~{fragments/header :: header-content}"></div>

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Edit Notification</h1>
                <div>
                    <a th:href="@{/admin/pages/notifications}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>

            <!-- Notification Form -->
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/pages/notifications/{id}(id=${notification.id})}" method="post">
                        <input type="hidden" name="id" th:value="${notification.id}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <h5 class="card-title mb-3">Notification Information</h5>

                                <div class="mb-3">
                                    <label for="employee" class="form-label">Created By <span class="text-danger">*</span></label>
                                    <select class="form-select" id="employee" name="createdBy.id" required>
                                        <option value="">-- Select Employee --</option>
                                        <option th:each="emp : ${employees}"
                                                th:value="${emp.id}"
                                                th:text="${emp.fullName}"
                                                th:selected="${notification.createdBy != null && notification.createdBy.id == emp.id}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="title" name="title"
                                           th:value="${notification.title}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
                                    <textarea class="form-control" id="content" name="content" rows="5" required
                                              th:text="${notification.content}"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-3">
                            <a th:href="@{/admin/pages/notifications}" class="btn btn-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Notification</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Scripts fragment -->
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
