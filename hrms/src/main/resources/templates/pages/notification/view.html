<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Details - HRMS</title>
    <!-- Include the header fragment with CSS links -->
    <div th:replace="~{fragments/header :: header-css}"></div>

    <link rel="stylesheet" href="/hrms/src/main/resources/templates/pages/insurance/congdao.css">
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div th:replace="~{fragments/header :: header-content}"></div>

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Notification Details</h1>
                <div>
                    <a th:href="@{/admin/pages/notifications/list}" class="btn btn-outline-secondary">
                        <i style="background-color:whitesmoke; color: black;">Back to List</i> 
                    </a>
                </div>
            </div>

            <!-- Notification information -->
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Notification Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="fw-bold">Basic Information</h6>
                            <table class="table table-bordered">
                                <tr>
                                    <th width="30%">Notification ID</th>
                                    <td th:text="${notification.id}">1</td>
                                </tr>
                                <tr>
                                    <th>Title</th>
                                    <td th:text="${notification.title}">Annual Meeting</td>
                                </tr>
                                <tr>
                                    <th>Content</th>
                                    <td th:text="${notification.content}">The company will hold an annual meeting at...</td>
                                </tr>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <h6 class="fw-bold">Created Information</h6>
                            <table class="table table-bordered">
                                <tr>
                                    <th width="30%">Created Date</th>
                                    <td th:text="${#temporals.format(notification.createdDate, 'dd/MM/yyyy')}">15/04/2025</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <h6 class="fw-bold">Created By</h6>
                    <table class="table table-bordered">
                        <tr>
                            <th width="20%">User ID</th>
                            <td th:text="${notification.createdBy != null ? notification.createdBy.id : 'N/A'}">1001</td>
                        </tr>
                        <tr>
                            <th>User Name</th>
                            <td th:text="${notification.createdBy != null ? notification.createdBy.fullName : 'N/A'}">John Doe</td>
                        </tr>
                    </table>

                    <div class="d-flex justify-content-end mt-3" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/admin/pages/notifications/{id}/edit(id=${notification.id})}" class="btn btn-primary me-2">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a th:href="@{/admin/pages/notifications/{id}/delete(id=${notification.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Are you sure you want to delete this notification?')">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
 
<!-- Footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Scripts fragment -->
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
