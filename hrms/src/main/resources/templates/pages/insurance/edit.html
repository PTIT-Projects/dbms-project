<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Insurance - HRMS</title>
    <div th:replace="~{fragments/header :: header-css}"></div>

    <link rel="stylesheet" href="congdao.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div th:replace="~{fragments/header :: header-content}"></div>

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Edit Insurance</h1>
                <div>
                    <a th:href="@{/admin/pages/insurances}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>

            <!-- Insurance Form -->
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/pages/insurance/{id}(id=${insurance.id})}" method="post">
                        <input type="hidden" name="id" th:value="${insurance.id}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <h5 class="card-title mb-3">Insurance Information</h5>

                                <div class="mb-3">
                                    <label for="employee" class="form-label">Employee <span class="text-danger">*</span></label>
                                    <select class="form-select" id="employee" name="employee.id" required>
                                        <option value="">-- Select Employee --</option>
                                        <option th:each="emp : ${employees}"
                                                th:value="${emp.id}"
                                                th:text="${emp.fullName}"
                                                th:selected="${insurance.employee != null && insurance.employee.id == emp.id}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="insuranceNumber" class="form-label">Insurance Number <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="insuranceNumber" name="insuranceNumber"
                                           th:value="${insurance.insuranceNumber}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="insuranceType" class="form-label">Insurance Type <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="insuranceType" name="insuranceType"
                                           th:value="${insurance.insuranceType}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="startDate" class="form-label">Start Date <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="startDate" name="startDate"
                                           th:value="${insurance.startDate}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="endDate" class="form-label">End Date</label>
                                    <input type="date" class="form-control" id="endDate" name="endDate"
                                           th:value="${insurance.endDate}">
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-3">
                            <a th:href="@{/admin/pages/insurances}" class="btn btn-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Insurance</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Scripts fragment -->
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
