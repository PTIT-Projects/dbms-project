<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance List - HRMS</title>
    <!-- Link đến header fragment chứa CSS -->
    <div th:replace="~{fragments/header :: header-css}"></div>

    <link rel="stylesheet" href="congdao.css">
    
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div th:replace="~{fragments/header :: header-content}"></div>

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Insurance Management</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <div sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/admin/pages/insurance/create}" class="btn btn-sm btn-primary">
                            <i class="bi bi-plus"></i> Add Insurance
                        </a>
                    </div>
                </div>
            </div>

            <!-- Bảng dữ liệu bảo hiểm -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee Name</th>
                        <th>Insurance Number</th>
                        <th>Type</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Actions</th>
                    </tr> 
                    </thead>
                    <tbody>
                    <tr th:each="insurance : ${insuranceRecords}">
                        <td th:text="${insurance.id}">1</td>
                        <td th:text="${insurance.employee != null ? insurance.employee.fullName : 'N/A'}">John Doe</td>
                        <td th:text="${insurance.insuranceNumber}">INS12345</td>
                        <td th:text="${insurance.insuranceType}">Health</td>
                        <td th:text="${#temporals.format(insurance.startDate, 'dd/MM/yyyy')}">01/01/2024</td>
                        <td th:text="${#temporals.format(insurance.endDate, 'dd/MM/yyyy')}">31/12/2024</td>
                        <td>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/pages/insurance/{id}/edit(id=${insurance.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/pages/insurance/{id}/delete(id=${insurance.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this insurance record?')">
                                    <i class="bi bi-trash">Delete</i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <!-- Hiển thị nếu không có bản ghi -->
                    <tr th:if="${#lists.isEmpty(insuranceRecords)}">
                        <td colspan="7" class="text-center">No insurance records found</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- Footer và JS -->
<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
