<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Balance Details - HRMS</title>

    <!-- Include common header CSS -->
    <div th:replace="~{fragments/header :: header-css}"></div>

    <!-- Custom CSS nếu có -->
    <link rel="stylesheet" href="/hrms/src/main/resources/templates/pages/insurance/congdao.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div th:replace="~{fragments/header :: header-content}"></div>

                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Leave Balance Details</h1>
                    <div>
                        <a th:href="@{/admin/pages/leave-balances}" class="btn btn-outline-secondary">
                            <i style="background-color:whitesmoke; color:black;">Back to List</i>
                        </a>
                    </div>
                </div>

                <!-- Leave Balance Info -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Leave Balance Information</h5>
                    </div>
                    <div class="card-body">

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <h6 class="fw-bold">Basic Information</h6>
                                <table class="table table-bordered">
                                    <tr>
                                        <th width="30%">Leave Balance ID</th>
                                        <td th:text="${leaveBalance.id}">1</td>
                                    </tr>
                                    <tr>
                                        <th>Year</th>
                                        <td th:text="${leaveBalance.year}">2024</td>
                                    </tr>
                                    <tr>
                                        <th>Total Leave Days</th>
                                        <td th:text="${leaveBalance.totalLeaveDays}">12</td>
                                    </tr>
                                    <tr>
                                        <th>Used Leave Days</th>
                                        <td th:text="${leaveBalance.usedLeaveDays}">4</td>
                                    </tr>
                                    <tr>
                                        <th>Remaining Leave Days</th>
                                        <td th:text="${leaveBalance.remainingLeaveDays}">8</td>
                                    </tr>
                                </table>
                            </div>

                            <div class="col-md-6">
                                <h6 class="fw-bold">Employee Information</h6>
                                <table class="table table-bordered">
                                    <tr>
                                        <th width="30%">Employee ID</th>
                                        <td th:text="${leaveBalance.employee.id}">1001</td>
                                    </tr>
                                    <tr>
                                        <th>Employee Name</th>
                                        <td th:text="${leaveBalance.employee.fullName}">John Doe</td>
                                    </tr>
                                    <tr>
                                        <th>Department</th>
                                        <td th:text="${leaveBalance.employee.department.departmentName}">IT Department</td>
                                    </tr>
                                    <tr>
                                        <th>Position</th>
                                        <td th:text="${leaveBalance.employee.position.positionName}">Developer</td>
                                    </tr>
                                </table>
                            </div>
                        </div>

                        <!-- Action buttons -->
                        <div class="d-flex justify-content-end mt-3" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/admin/pages/leave-balances/{id}/edit(id=${leaveBalance.id})}" class="btn btn-primary me-2">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <a th:href="@{/admin/pages/leave-balances/{id}/delete(id=${leaveBalance.id})}"
                               class="btn btn-danger"
                               onclick="return confirm('Are you sure you want to delete this leave balance record?')">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Scripts fragment -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>

</html>
